name: Publish plugin artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mcp-call:
    name: mcp-call
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for spec in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            IFS=/ read -r goos goarch <<< "$spec"
            out="dist/mcp-call-${goos}-${goarch}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/mcp-call
            chmod +x "$out"
          done
          (cd dist && sha256sum mcp-call-* > checksums.txt)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-call-binaries
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
